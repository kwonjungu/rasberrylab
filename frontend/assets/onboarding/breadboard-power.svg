  <text x="360" y="110" font-size="56" text-anchor="middle">🟢</text>
  
  <rect x="40" y="250" width="400" height="46" rx="23" fill="#ffffff" opacity="0.92"/>
  <text x="240" y="281" font-size="24" font-weight="700" text-anchor="middle"
        font-family="'Noto Sans KR','Malgun Gothic',sans-serif" fill="#1f2a44">빵판에 전원을 연결해요</text>
