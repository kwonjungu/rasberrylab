  <rect x="6" y="6" width="468" height="308" rx="28" fill="url(#bg)" stroke="#ffffff" stroke-width="4"/>
  <circle cx="70" cy="64" r="26" fill="#ffffff" opacity="0.5"/>
  <circle cx="420" cy="250" r="34" fill="#ffffff" opacity="0.45"/>
